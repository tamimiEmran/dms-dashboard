<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMS Work Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F8F9FB; --bg-card: #FFFFFF; --bg-elevated: #F0F1F4;
      --border: #E0E2E8; --text: #1A1D26; --text-dim: #5A5E6E; --text-muted: #8E92A0;
      --accent: #0E9A7E; --accent-dim: rgba(14,154,126,0.08);
      --accent-2: #3B6FD6; --accent-2-dim: rgba(59,111,214,0.08);
      --accent-3: #C88A1A; --accent-3-dim: rgba(200,138,26,0.08);
      --font: 'DM Sans', system-ui, sans-serif; --mono: 'JetBrains Mono', monospace;
      --radius: 10px; --radius-sm: 6px;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      line-height: 1.55; -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 56px 80px 48px;
    }
    .tag {
      display: inline-block; font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px;
      border-radius: var(--radius-sm); margin-bottom: 10px;
      background: var(--accent-dim); color: var(--accent);
    }
    h2 { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
    h3 { font-size: 14px; font-weight: 400; color: var(--text-dim); line-height: 1.5; margin-bottom: 16px; }
    .flowchart-container { width: 100%; display: flex; justify-content: center; margin: 10px 0; }
    .flowchart-container svg text { font-family: 'DM Sans', system-ui, sans-serif; }
  </style>
</head>
<body>
  <span class="tag">Overview</span>
  <h2>Work Flow</h2>
  <h3>Detailed pipeline stages for Data, Model, and HW teams — with action items and expected outcomes</h3>

  <div class="flowchart-container" style="align-items:center;">
    <svg viewBox="0 0 1400 550" xmlns="http://www.w3.org/2000/svg" width="1700">
      <defs>
        <marker id="arrow-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0E9A7E" stroke-width="1.2" /></marker>
        <marker id="arrow-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3B6FD6" stroke-width="1.2" /></marker>
        <marker id="arrow-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="none" stroke="#C88A1A" stroke-width="1.2" /></marker>
        <marker id="arrow-w" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8E92A0" stroke-width="1.2" /></marker>
      </defs>

      <!-- ===== DATA TEAM (Row 1) ===== -->
      <text x="20" y="44" fill="#0E9A7E" font-size="11" font-weight="600" letter-spacing="0.08em">DATA TEAM</text>

      <!-- Sub-row 1: stages 1-5 -->
      <rect x="20" y="56" width="140" height="54" rx="6" fill="#FFF" stroke="#E0E2E8" />
      <text x="90" y="78" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Data Ingestion</text>
      <text x="90" y="93" fill="#8E92A0" font-size="10" text-anchor="middle">All data sources</text>

      <rect x="186" y="56" width="140" height="54" rx="6" fill="#FFF" stroke="#0E9A7E" stroke-opacity="0.4" />
      <text x="256" y="78" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Storage &amp; Org</text>
      <text x="256" y="93" fill="#0E9A7E" font-size="10" text-anchor="middle">Structured data lake</text>

      <rect x="352" y="56" width="140" height="54" rx="6" fill="#FFF" stroke="#0E9A7E" stroke-opacity="0.4" />
      <text x="422" y="78" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Storage Optimiz.</text>
      <text x="422" y="93" fill="#0E9A7E" font-size="10" text-anchor="middle">Dedup, compression</text>

      <rect x="518" y="56" width="140" height="54" rx="6" fill="#FFF" stroke="#0E9A7E" stroke-opacity="0.4" />
      <text x="588" y="78" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Frame Extraction</text>
      <text x="588" y="93" fill="#0E9A7E" font-size="10" text-anchor="middle">Video → key frames</text>

      <rect x="684" y="56" width="140" height="54" rx="6" fill="#FFF" stroke="#0E9A7E" stroke-opacity="0.4" />
      <text x="754" y="78" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Preprocessing</text>
      <text x="754" y="93" fill="#0E9A7E" font-size="10" text-anchor="middle">Resize, crop, normalize</text>

      <!-- Sub-row 1 arrows -->
      <line x1="160" y1="83" x2="186" y2="83" stroke="#0E9A7E" stroke-width="1.2" marker-end="url(#arrow-g)" />
      <line x1="326" y1="83" x2="352" y2="83" stroke="#0E9A7E" stroke-width="1.2" marker-end="url(#arrow-g)" />
      <line x1="492" y1="83" x2="518" y2="83" stroke="#0E9A7E" stroke-width="1.2" marker-end="url(#arrow-g)" />
      <line x1="658" y1="83" x2="684" y2="83" stroke="#0E9A7E" stroke-width="1.2" marker-end="url(#arrow-g)" />

      <!-- Wrap connector: sub-row 1 → sub-row 2 -->
      <path d="M824,83 L848,83 L848,122 L8,122 L8,161 L20,161" fill="none" stroke="#0E9A7E" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-g)" />

      <!-- Sub-row 2: stages 6-10 -->
      <rect x="20" y="134" width="140" height="54" rx="6" fill="#FFF" stroke="#0E9A7E" stroke-opacity="0.4" />
      <text x="90" y="156" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Auto Annotation</text>
      <text x="90" y="171" fill="#0E9A7E" font-size="10" text-anchor="middle">Model-assisted labels</text>

      <rect x="186" y="134" width="140" height="54" rx="6" fill="#FFF" stroke="#0E9A7E" stroke-opacity="0.4" />
      <text x="256" y="156" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Data Augment.</text>
      <text x="256" y="171" fill="#0E9A7E" font-size="10" text-anchor="middle">Transform pipeline</text>

      <rect x="352" y="134" width="140" height="54" rx="6" fill="#FFF" stroke="#0E9A7E" stroke-opacity="0.4" />
      <text x="422" y="156" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Manual Validation</text>
      <text x="422" y="171" fill="#0E9A7E" font-size="10" text-anchor="middle">Human QA review</text>

      <!-- Milestone: Consolidated Dataset -->
      <rect x="518" y="128" width="140" height="66" rx="8" fill="#E8F5F1" stroke="#0E9A7E" stroke-width="1.5" />
      <text x="588" y="152" fill="#0E9A7E" font-size="13" font-weight="600" text-anchor="middle">Consolidated</text>
      <text x="588" y="166" fill="#0E9A7E" font-size="13" font-weight="600" text-anchor="middle">Dataset</text>
      <text x="588" y="182" fill="#8E92A0" font-size="10" text-anchor="middle">Validated &amp; unified</text>

      <rect x="684" y="134" width="140" height="54" rx="6" fill="#FFF" stroke="#0E9A7E" stroke-opacity="0.4" />
      <text x="754" y="156" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Continuous Monitor</text>
      <text x="754" y="171" fill="#0E9A7E" font-size="10" text-anchor="middle">Drift &amp; quality</text>

      <!-- Sub-row 2 arrows -->
      <line x1="160" y1="161" x2="186" y2="161" stroke="#0E9A7E" stroke-width="1.2" marker-end="url(#arrow-g)" />
      <line x1="326" y1="161" x2="352" y2="161" stroke="#0E9A7E" stroke-width="1.2" marker-end="url(#arrow-g)" />
      <line x1="492" y1="161" x2="518" y2="161" stroke="#0E9A7E" stroke-width="1.2" marker-end="url(#arrow-g)" />
      <line x1="658" y1="161" x2="684" y2="161" stroke="#0E9A7E" stroke-width="1.2" marker-end="url(#arrow-g)" />

      <!-- ===== MODEL TEAM (Row 2) ===== -->
      <text x="20" y="232" fill="#3B6FD6" font-size="11" font-weight="600" letter-spacing="0.08em">MODEL TEAM</text>

      <!-- Early phase: built & tested BEFORE consolidated data -->
      <rect x="20" y="248" width="140" height="54" rx="6" fill="#FFF" stroke="#E0E2E8" />
      <text x="90" y="270" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Error Analysis</text>
      <text x="90" y="285" fill="#8E92A0" font-size="10" text-anchor="middle">OEM benchmark gaps</text>

      <rect x="186" y="248" width="140" height="54" rx="6" fill="#FFF" stroke="#3B6FD6" stroke-opacity="0.4" />
      <text x="256" y="270" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Pipeline Dev</text>
      <text x="256" y="285" fill="#3B6FD6" font-size="10" text-anchor="middle">Eval &amp; training tools</text>

      <rect x="352" y="248" width="140" height="54" rx="6" fill="#FFF" stroke="#3B6FD6" stroke-opacity="0.4" />
      <text x="422" y="270" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">OS Frameworks</text>
      <text x="422" y="285" fill="#3B6FD6" font-size="10" text-anchor="middle">Models &amp; architectures</text>

      <!-- Arrows: early phase (solid — active work) -->
      <line x1="160" y1="275" x2="186" y2="275" stroke="#3B6FD6" stroke-width="1.2" marker-end="url(#arrow-b)" />
      <line x1="326" y1="275" x2="352" y2="275" stroke="#3B6FD6" stroke-width="1.2" marker-end="url(#arrow-b)" />

      <!-- Dashed gap: awaiting consolidated data before fine-tuning -->
      <line x1="492" y1="275" x2="534" y2="275" stroke="#3B6FD6" stroke-width="1.2" stroke-dasharray="6,4" marker-end="url(#arrow-b)" />
      <text x="513" y="264" fill="#3B6FD6" font-size="9" font-style="italic" text-anchor="middle">awaits data</text>

      <!-- Post-data phase: fine-tune with consolidated dataset -->
      <rect x="534" y="248" width="140" height="54" rx="6" fill="#FFF" stroke="#3B6FD6" stroke-opacity="0.4" />
      <text x="604" y="270" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Fine-tune &amp; Select</text>
      <text x="604" y="285" fill="#3B6FD6" font-size="10" text-anchor="middle">On consolidated data</text>

      <line x1="674" y1="275" x2="700" y2="275" stroke="#3B6FD6" stroke-width="1.2" marker-end="url(#arrow-b)" />

      <!-- Milestone: Deploy-Ready List -->
      <rect x="700" y="242" width="140" height="66" rx="8" fill="#E8F0FA" stroke="#3B6FD6" stroke-width="1.5" />
      <text x="770" y="266" fill="#3B6FD6" font-size="13" font-weight="600" text-anchor="middle">Deploy-Ready</text>
      <text x="770" y="280" fill="#3B6FD6" font-size="13" font-weight="600" text-anchor="middle">List</text>
      <text x="770" y="296" fill="#8E92A0" font-size="10" text-anchor="middle">Validated models</text>

      <!-- ===== HW TEAM (Row 3) ===== -->
      <text x="20" y="348" fill="#C88A1A" font-size="11" font-weight="600" letter-spacing="0.08em">HW TEAM</text>

      <!-- Sub-row 1: early HW pipeline (proceeds independently of final models) -->
      <rect x="20" y="362" width="140" height="54" rx="6" fill="#FFF" stroke="#E0E2E8" />
      <text x="90" y="384" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Defined Specs</text>
      <text x="90" y="399" fill="#8E92A0" font-size="10" text-anchor="middle">Model reqs &amp; HW specs</text>

      <line x1="160" y1="389" x2="352" y2="389" stroke="#C88A1A" stroke-width="1.2" marker-end="url(#arrow-a)" />

      <rect x="352" y="362" width="140" height="54" rx="6" fill="#FFF" stroke="#C88A1A" stroke-opacity="0.4" />
      <text x="422" y="384" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Fleet Testing</text>
      <text x="422" y="399" fill="#C88A1A" font-size="10" text-anchor="middle">Deploy &amp; compare</text>

      <line x1="492" y1="389" x2="518" y2="389" stroke="#C88A1A" stroke-width="1.2" marker-end="url(#arrow-a)" />

      <rect x="518" y="362" width="140" height="54" rx="6" fill="#FFF" stroke="#C88A1A" stroke-opacity="0.4" />
      <text x="588" y="384" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Eng. Design</text>
      <text x="588" y="399" fill="#C88A1A" font-size="10" text-anchor="middle">SoC, BOM, CAD</text>

      <!-- Vertical connector: sent to contract manufacturer (dashed — mfg lead time) -->
      <line x1="588" y1="416" x2="588" y2="446" stroke="#C88A1A" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-a)" />
      <text x="602" y="435" fill="#C88A1A" font-size="8.5" font-style="italic">contract mfg</text>

      <!-- Sub-row 2: post-manufacturing -->
      <rect x="518" y="446" width="140" height="54" rx="6" fill="#FFF" stroke="#C88A1A" stroke-opacity="0.4" />
      <text x="588" y="468" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Receive &amp; Test</text>
      <text x="588" y="483" fill="#C88A1A" font-size="10" text-anchor="middle">Manufactured HW</text>

      <line x1="658" y1="473" x2="700" y2="473" stroke="#C88A1A" stroke-width="1.2" marker-end="url(#arrow-a)" />

      <!-- Milestone: Deploy finalized model to fleet -->
      <rect x="700" y="440" width="140" height="66" rx="8" fill="#E8F5F1" stroke="#0E9A7E" stroke-width="1.5" />
      <text x="770" y="464" fill="#0E9A7E" font-size="13" font-weight="600" text-anchor="middle">Deploy to</text>
      <text x="770" y="478" fill="#0E9A7E" font-size="13" font-weight="600" text-anchor="middle">Fleet</text>
      <text x="770" y="494" fill="#8E92A0" font-size="10" text-anchor="middle">Finalized model on HW</text>

      <!-- ===== CROSS-TEAM DEPENDENCIES ===== -->

      <!-- Data Consolidated Dataset → Model Fine-tune -->
      <line x1="588" y1="194" x2="588" y2="242" stroke="#8E92A0" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-w)" />
      <text x="574" y="222" fill="#8E92A0" font-size="9" font-style="italic" text-anchor="end">feeds data</text>

      <!-- Model OS Frameworks → HW Fleet Testing (early fleet deployment) -->
      <line x1="422" y1="302" x2="422" y2="362" stroke="#8E92A0" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-w)" />
      <text x="436" y="336" fill="#8E92A0" font-size="9" font-style="italic">fleet testing</text>

      <!-- Model Deploy-Ready → HW Deploy to Fleet (final model handoff) -->
      <line x1="770" y1="308" x2="770" y2="440" stroke="#8E92A0" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-w)" />
      <text x="784" y="378" fill="#8E92A0" font-size="9" font-style="italic">model handoff</text>

      <!-- HW Specs ↔ Model constraints -->
      <line x1="90" y1="302" x2="90" y2="362" stroke="#8E92A0" stroke-width="1" stroke-dasharray="3,3" />

      <!-- ===== RIGHT COLUMN: ACTION ITEMS ===== -->
      <line x1="858" y1="18" x2="858" y2="520" stroke="#E0E2E8" stroke-width="1" />
      <text x="878" y="30" fill="#8E92A0" font-size="9.5" font-weight="700" letter-spacing="0.1em">ACTION ITEMS &amp; EXPECTED OUTCOMES</text>

      <!-- Data Team outcomes -->
      <rect x="868" y="48" width="3.5" height="100" rx="1.5" fill="#0E9A7E" opacity="0.5" />
      <text x="884" y="64" fill="#0E9A7E" font-size="11" font-weight="600">Data Team</text>
      <text x="884" y="82" fill="#5A5E6E" font-size="10.5">• Build unified data lake (OEM + OS + raw)</text>
      <text x="884" y="96" fill="#5A5E6E" font-size="10.5">• Automate ingestion → annotation pipeline</text>
      <text x="884" y="110" fill="#5A5E6E" font-size="10.5">• 95%+ annotation accuracy (model-assisted)</text>
      <text x="884" y="124" fill="#5A5E6E" font-size="10.5">• Target: 500K+ validated, labeled frames</text>
      <text x="884" y="138" fill="#5A5E6E" font-size="10.5">• Continuous quality monitoring &amp; drift detection</text>

      <!-- Model Team outcomes -->
      <rect x="868" y="230" width="3.5" height="96" rx="1.5" fill="#3B6FD6" opacity="0.5" />
      <text x="884" y="246" fill="#3B6FD6" font-size="11" font-weight="600">Model Team</text>
      <text x="884" y="264" fill="#5A5E6E" font-size="10.5">• Build eval &amp; training pipelines (pre-data)</text>
      <text x="884" y="278" fill="#5A5E6E" font-size="10.5">• Evaluate OS models &amp; frameworks on fleet early</text>
      <text x="884" y="292" fill="#5A5E6E" font-size="10.5">• Outperform OEMs (target ≥97% accuracy)</text>
      <text x="884" y="306" fill="#5A5E6E" font-size="10.5">• Edge-optimized: &lt;5ms latency, &lt;50MB</text>
      <text x="884" y="320" fill="#5A5E6E" font-size="10.5">• Deliver curated deploy-ready model list</text>

      <!-- HW Team outcomes -->
      <rect x="868" y="346" width="3.5" height="112" rx="1.5" fill="#C88A1A" opacity="0.5" />
      <text x="884" y="362" fill="#C88A1A" font-size="11" font-weight="600">HW Team</text>
      <text x="884" y="380" fill="#5A5E6E" font-size="10.5">• Establish model requirements &amp; base HW specs</text>
      <text x="884" y="394" fill="#5A5E6E" font-size="10.5">• Deploy &amp; compare OS frameworks on fleet</text>
      <text x="884" y="408" fill="#5A5E6E" font-size="10.5">• Finalize SoC, sensor BOM, schematics &amp; Gerbers</text>
      <text x="884" y="422" fill="#5A5E6E" font-size="10.5">• 3D CAD &amp; thermal design → send to mfg early</text>
      <text x="884" y="436" fill="#5A5E6E" font-size="10.5">• Receive, assemble &amp; test manufactured HW</text>
      <text x="884" y="450" fill="#5A5E6E" font-size="10.5">• Deploy finalized model to fleet vehicles</text>

      <rect x="20" y="526" width="10" height="10" rx="2" fill="#0E9A7E" opacity="0.6" />

  </div>
</body>
