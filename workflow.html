<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMS Work Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F8F9FB;
      --bg-card: #FFFFFF;
      --bg-elevated: #F0F1F4;
      --border: #E0E2E8;
      --text: #1A1D26;
      --text-dim: #5A5E6E;
      --text-muted: #8E92A0;
      --accent: #0E9A7E;
      --accent-dim: rgba(14, 154, 126, 0.08);
      --accent-2: #3B6FD6;
      --accent-2-dim: rgba(59, 111, 214, 0.08);
      --accent-3: #C88A1A;
      --accent-3-dim: rgba(200, 138, 26, 0.08);
      --red: #D9453E;
      --red-dim: rgba(217, 69, 62, 0.07);
      --purple: #8B5CC4;
      --purple-dim: rgba(139, 92, 196, 0.08);
      --teal: #0E8A9A;
      --teal-dim: rgba(14, 138, 154, 0.08);
      --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 56px 80px 48px;
    }

    .tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      background: var(--accent-dim);
      color: var(--accent);
    }

    h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    h3 {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .flowchart-container {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 10px 0;
    }

    .flowchart-container svg text {
      font-family: 'DM Sans', system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <span class="tag">Overview</span>
  <h2>Work Flow</h2>
  <h3>Data team covers the creation of the consolidated dataset, Model team develops and fine-tunes the edge and
    centralized models, HW team deploys on edge</h3>

  <div class="flowchart-container" style="align-items:center;">
    <svg viewBox="0 0 1340 520" xmlns="http://www.w3.org/2000/svg" width="1700">
      <!-- Defs -->
      <defs>
        <marker id="arrow-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0E9A7E" stroke-width="1.2" />
        </marker>
        <marker id="arrow-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3B6FD6" stroke-width="1.2" />
        </marker>
        <marker id="arrow-b-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
          <path d="M8,0 L0,3 L8,6" fill="none" stroke="#3B6FD6" stroke-width="1.2" />
        </marker>
        <marker id="arrow-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="none" stroke="#C88A1A" stroke-width="1.2" />
        </marker>
        <marker id="arrow-w" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8E92A0" stroke-width="1.2" />
        </marker>
      </defs>

      <!-- DATA WORKSTREAM (Row 1) -->
      <text x="20" y="46" fill="#0E9A7E" font-size="11" font-weight="600" letter-spacing="0.08em"
        text-transform="uppercase">DATA TEAM</text>

      <!-- Open Source -->
      <rect x="20" y="56" width="140" height="44" rx="6" fill="#FFFFFF" stroke="#E0E2E8" />
      <text x="90" y="75" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Open-Source</text>
      <text x="90" y="90" fill="#8E92A0" font-size="10.5" text-anchor="middle">Roboflow*, Kaggle, research.</text>

      <!-- Howen Alert Data -->
      <rect x="20" y="108" width="140" height="44" rx="6" fill="#FFFFFF" stroke="#E0E2E8" />
      <text x="90" y="127" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">OEM Alerts
        Data</text>
      <text x="90" y="142" fill="#8E92A0" font-size="10.5" text-anchor="middle">Fleet camera alerts</text>

      <!-- Raw Footage -->
      <rect x="20" y="160" width="140" height="44" rx="6" fill="#FFFFFF" stroke="#E0E2E8" />
      <text x="90" y="179" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Raw Footage</text>
      <text x="90" y="194" fill="#8E92A0" font-size="10.5" text-anchor="middle">Unlabelled video</text>

      <!-- Arrow: sources -> annotation -->
      <line x1="160" y1="78" x2="200" y2="116" stroke="#0E9A7E" stroke-width="1.2" stroke-dasharray="4,3"
        marker-end="url(#arrow-g)" />
      <line x1="160" y1="130" x2="200" y2="126" stroke="#0E9A7E" stroke-width="1.2" stroke-dasharray="4,3"
        marker-end="url(#arrow-g)" />
      <line x1="160" y1="182" x2="200" y2="138" stroke="#0E9A7E" stroke-width="1.2" stroke-dasharray="4,3"
        marker-end="url(#arrow-g)" />

      <!-- Annotation -->
      <rect x="210" y="98" width="150" height="56" rx="6" fill="#FFFFFF" stroke="#0E9A7E" stroke-opacity="0.4" />
      <text x="285" y="120" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Annotation</text>
      <text x="285" y="136" fill="#0E9A7E" font-size="10" text-anchor="middle">Model-assisted + Human</text>

      <!-- Arrow: annotation -> augmentation -->
      <line x1="360" y1="126" x2="400" y2="126" stroke="#0E9A7E" stroke-width="1.2" marker-end="url(#arrow-g)" />

      <!-- Augmentation -->
      <rect x="410" y="98" width="140" height="56" rx="6" fill="#FFFFFF" stroke="#0E9A7E" stroke-opacity="0.4" />
      <text x="480" y="120" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Augmentation</text>
      <text x="480" y="136" fill="#0E9A7E" font-size="10" text-anchor="middle">Preprocessing pipeline</text>

      <!-- Arrow: augmentation -> consolidated -->
      <line x1="550" y1="126" x2="600" y2="126" stroke="#0E9A7E" stroke-width="1.2" marker-end="url(#arrow-g)" />

      <!-- CONSOLIDATED DATASET (convergence) -->
      <rect x="610" y="82" width="170" height="88" rx="8" fill="#E8F5F1" stroke="#0E9A7E" stroke-width="1.5" />
      <text x="695" y="115" fill="#0E9A7E" font-size="13" font-weight="600" text-anchor="middle">Consolidated</text>
      <text x="695" y="132" fill="#0E9A7E" font-size="13" font-weight="600" text-anchor="middle">Dataset</text>
      <text x="695" y="155" fill="#8E92A0" font-size="10" text-anchor="middle">Open + OEM alerts + Raw</text>

      <!-- MODEL WORKSTREAM (Row 2) -->
      <text x="20" y="236" fill="#3B6FD6" font-size="11" font-weight="600" letter-spacing="0.08em">MODEL TEAM</text>

      <!-- Research -->
      <rect x="20" y="250" width="140" height="52" rx="6" fill="#FFFFFF" stroke="#E0E2E8" />
      <text x="90" y="272" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Architecture</text>
      <text x="90" y="287" fill="#8E92A0" font-size="10.5" text-anchor="middle">Research &amp; selection</text>

      <!-- Arrow: research -> eval -->
      <line x1="160" y1="276" x2="210" y2="276" stroke="#3B6FD6" stroke-width="1.2" marker-end="url(#arrow-b)" />

      <!-- Pretrained Eval -->
      <rect x="220" y="250" width="150" height="52" rx="6" fill="#FFFFFF" stroke="#3B6FD6" stroke-opacity="0.4" />
      <text x="295" y="272" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Pretrained
        Eval</text>
      <text x="295" y="287" fill="#3B6FD6" font-size="10" text-anchor="middle">On open + OEMs subset</text>

      <!-- Arrow: eval -> fine-tuning -->
      <line x1="370" y1="276" x2="600" y2="276" stroke="#3B6FD6" stroke-width="1.2" stroke-dasharray="6,4"
        marker-end="url(#arrow-b)" />
      <text x="486" y="268" fill="#3B6FD6" font-size="9.5" font-style="italic" text-anchor="middle">awaits
        consolidated data</text>

      <!-- Fine-tuning (after convergence) -->
      <rect x="610" y="250" width="170" height="52" rx="6" fill="#FFFFFF" stroke="#3B6FD6" stroke-opacity="0.4" />
      <text x="695" y="270" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Fine-tuning</text>
      <text x="695" y="286" fill="#3B6FD6" font-size="10" text-anchor="middle">Edge + Centralized models</text>

      <!-- Arrow: consolidated -> fine-tuning (vertical connection) -->
      <line x1="695" y1="170" x2="695" y2="250" stroke="#8E92A0" stroke-width="1.2" stroke-dasharray="4,3"
        marker-end="url(#arrow-w)" />

      <!-- Arrow: fine-tuning <-> benchmark -->
      <line x1="780" y1="276" x2="830" y2="276" stroke="#3B6FD6" stroke-width="1.2" marker-start="url(#arrow-b-rev)"
        marker-end="url(#arrow-b)" />

      <!-- Benchmark -->
      <rect x="840" y="250" width="140" height="52" rx="6" fill="#FFFFFF" stroke="#3B6FD6" stroke-opacity="0.4" />
      <text x="910" y="272" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">Evaluation</text>
      <text x="910" y="287" fill="#3B6FD6" font-size="10" text-anchor="middle">Accuracy / latency / size</text>

      <!-- HW WORKSTREAM (Row 3) -->
      <text x="20" y="376" fill="#C88A1A" font-size="11" font-weight="600" letter-spacing="0.08em">HW TEAM</text>

      <!-- HW Assessment -->
      <rect x="20" y="390" width="160" height="52" rx="6" fill="#FFFFFF" stroke="#E0E2E8" />
      <text x="100" y="412" fill="#1A1D26" font-size="12.5" font-weight="500" text-anchor="middle">HW
        Assessment</text>
      <text x="100" y="427" fill="#8E92A0" font-size="10.5" text-anchor="middle">TOPs, memory, NPU specs</text>

      <!-- Arrow -->
      <line x1="180" y1="416" x2="400" y2="416" stroke="#C88A1A" stroke-width="1.2" stroke-dasharray="6,4"
        marker-end="url(#arrow-a)" />
      <text x="290" y="408" fill="#C88A1A" font-size="9.5" font-style="italic" text-anchor="middle">limits model
        size</text>

      <!-- Compatibility -->
      <rect x="410" y="390" width="140" height="52" rx="6" fill="#FFFFFF" stroke="#C88A1A" stroke-opacity="0.4" />
      <text x="480" y="412" fill="#1A1D26" font-size="12.5" font-weight="500"
        text-anchor="middle">Compatibility</text>
      <text x="480" y="427" fill="#C88A1A" font-size="10" text-anchor="middle">Model ↔ Device fit</text>

      <!-- Arrow: compatibility -> deployment -->
      <line x1="550" y1="416" x2="830" y2="416" stroke="#C88A1A" stroke-width="1.2" stroke-dasharray="6,4"
        marker-end="url(#arrow-a)" />

      <!-- HW constraint -> model selection (upward arrow) -->
      <line x1="480" y1="390" x2="480" y2="302" stroke="#8E92A0" stroke-width="1" stroke-dasharray="3,3" />
      <line x1="910" y1="390" x2="910" y2="302" stroke="#8E92A0" stroke-width="1" stroke-dasharray="3,3" />

      <!-- DEPLOYMENT (final) -->
      <rect x="840" y="390" width="160" height="52" rx="6" fill="#E8F5F1" stroke="#0E9A7E" stroke-width="1.5" />
      <text x="920" y="412" fill="#0E9A7E" font-size="13" font-weight="600" text-anchor="middle">Edge
        Deployment</text>
      <text x="920" y="427" fill="#8E92A0" font-size="10" text-anchor="middle">On-device inference</text>

      <!-- Arrow: benchmark -> deployment -->
      <line x1="910" y1="302" x2="910" y2="390" stroke="#3B6FD6" stroke-width="1.2" stroke-dasharray="4,3" />

      <!-- ===== ULTIMATE OBJECTIVE COLUMN (right side) ===== -->

      <!-- Column divider -->
      <line x1="1040" y1="18" x2="1040" y2="468" stroke="#E0E2E8" stroke-width="1" />

      <!-- Column header -->
      <text x="1060" y="30" fill="#8E92A0" font-size="9.5" font-weight="700" letter-spacing="0.1em">ULTIMATE
        OBJECTIVE</text>

      <!-- Data Team -->
      <rect x="1050" y="48" width="3.5" height="160" rx="1.5" fill="#0E9A7E" opacity="0.5" />
      <text x="1066" y="118" fill="#0E9A7E" font-size="12" font-weight="600">Creating a consolidated</text>
      <text x="1066" y="136" fill="#0E9A7E" font-size="12" font-weight="600">rich dataset</text>

      <!-- Model Team -->
      <rect x="1050" y="234" width="3.5" height="72" rx="1.5" fill="#3B6FD6" opacity="0.5" />
      <text x="1066" y="264" fill="#3B6FD6" font-size="12" font-weight="600">create Mowasalat models that
        outperform</text>
      <text x="1066" y="282" fill="#3B6FD6" font-size="12" font-weight="600">the current OEMs models (target
        97%)</text>

      <!-- HW Team -->
      <rect x="1050" y="374" width="3.5" height="72" rx="1.5" fill="#C88A1A" opacity="0.5" />
      <text x="1066" y="390" fill="#C88A1A" font-size="11" font-weight="600">Build our own DMS camera</text>
      <text x="1066" y="406" fill="#C88A1A" font-size="11" font-weight="600">powered by our proprietary</text>
      <text x="1066" y="422" fill="#C88A1A" font-size="11" font-weight="600">model, white-labeled by a</text>
      <text x="1066" y="438" fill="#C88A1A" font-size="11" font-weight="600">contract manufacturer</text>

      <!-- Legend -->
      <rect x="20" y="480" width="10" height="10" rx="2" fill="#0E9A7E" opacity="0.6" />
      <text x="36" y="489" fill="#8E92A0" font-size="10.5">Data team</text>
      <rect x="120" y="480" width="10" height="10" rx="2" fill="#3B6FD6" opacity="0.6" />
      <text x="136" y="489" fill="#8E92A0" font-size="10.5">Model team</text>
      <rect x="230" y="480" width="10" height="10" rx="2" fill="#C88A1A" opacity="0.6" />
      <text x="246" y="489" fill="#8E92A0" font-size="10.5">HW team</text>
      <circle cx="345" cy="485" r="4" fill="none" stroke="#8E92A0" stroke-dasharray="2,2" />
      <text x="355" y="489" fill="#8E92A0" font-size="10.5">Dependency / handoff</text>
    </svg>
  </div>
</body>
</html>
