  <line x1="410" y1="286" x2="410" y2="298" stroke="#8E92A0" stroke-width="1" />
  <text x="410" y="316" fill="#8E92A0" font-size="10.5" font-family="JetBrains Mono, monospace" text-anchor="middle" letter-spacing="0.04em">May 5</text>

