  <rect x="450" y="552" width="12" height="12" rx="2" fill="#E8F5F1" stroke="#0E9A7E" stroke-width="1.5" />
  <text x="468" y="562" fill="#5A5E6E" font-size="10.5">Mass rollout / target</text>

  <rect x="640" y="552" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#3B6FD6" stroke-dasharray="3,2" stroke-width="1.5" />
