  <path d="M511,389 L515,389 Q535,389 535,376 L535,250 Q535,232 552,232 L565,232 L565,222" fill="none" stroke="#8B5CC4" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#mdc-arrow-p)" />
