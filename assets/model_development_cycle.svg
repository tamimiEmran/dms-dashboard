<?xml version="1.0" encoding="UTF-8"?>
<!--
  Model Development Cycle timeline.
  Date axis: 2026-04-15 → 2026-06-30 (76 days, ~15.5 px/day).
  Visual idiom borrowed from reports/dms/workflow.html (palette, fonts, card style).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 460" width="1400" font-family="'DM Sans', system-ui, sans-serif">
  <defs>
    <marker id="mdc-arrow-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3B6FD6" stroke-width="1.2" />
    </marker>
    <marker id="mdc-arrow-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#C88A1A" stroke-width="1.2" />
    </marker>
    <marker id="mdc-arrow-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8B5CC4" stroke-width="1.2" />
    </marker>
    <marker id="mdc-arrow-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0E9A7E" stroke-width="1.2" />
    </marker>
  </defs>

  <!-- ===== HEADER ===== -->
